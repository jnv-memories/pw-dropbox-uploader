name: Upload Files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"


jobs:

  upload:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r uploader/requirements.txt

      - name: Create Firebase Credentials
        run: |
          cat > uploader/firebase.json << 'EOF'
          ${{ secrets.FIREBASE_JSON }}
          EOF

      ######################################################
      # CHANGE THESE VALUES WHEN NEEDED
      ######################################################

      - name: Run uploader
        working-directory: uploader

        env:

          PW_TOKEN: ${{ secrets.PW_TOKEN }}

          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}

          #
          # Choose source
          #
          # drive
          # url
          #

          DOWNLOAD_SOURCE: url

          

        run: |

          if [ "$DOWNLOAD_SOURCE" = "drive" ]; then

            echo "Using Google Drive source..."

            python upload_from_gdrive.py

          elif [ "$DOWNLOAD_SOURCE" = "url" ]; then

            echo "Using Direct URL source..."

            python upload_from_url.py

          else

            echo "Unknown DOWNLOAD_SOURCE: $DOWNLOAD_SOURCE"

            exit 1

          fi
