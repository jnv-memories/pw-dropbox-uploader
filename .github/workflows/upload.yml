name: Upload Files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 1. Install ONLY the requirement needed to check jobs
      - name: Install requests
        run: pip install requests

      # 2. Check for jobs BEFORE heavy installations
      - name: Check for jobs
        id: check_jobs
        working-directory: uploader
        run: |
          RESULT=$(python jobs.py)
          if [ "$RESULT" = "true" ]; then
            echo "Jobs found. Proceeding with workflow..."
            echo "has_jobs=true" >> $GITHUB_OUTPUT
          else
            echo "No jobs in queue. Halting execution gracefully."
            echo "has_jobs=false" >> $GITHUB_OUTPUT
          fi

      # 3. Setup Cloudflare WARP Proxy
      - name: Setup Cloudflare WARP Proxy
        if: steps.check_jobs.outputs.has_jobs == 'true'
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5 

      # 4. NEW FIX: Install FFmpeg AND System-level Node.js (Guarantees yt-dlp can solve JS challenges)
      - name: Install System Packages
        if: steps.check_jobs.outputs.has_jobs == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs

      # 5. Install dependencies (Using MASTER branch)
      - name: Install dependencies
        if: steps.check_jobs.outputs.has_jobs == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r uploader/requirements.txt
          pip install -U git+https://github.com/yt-dlp/yt-dlp.git@master

      - name: Create Firebase Credentials
        if: steps.check_jobs.outputs.has_jobs == 'true'
        run: |
          cat > uploader/firebase.json << 'EOF'
          ${{ secrets.FIREBASE_JSON }}
          EOF
      
      # 6. Final step cleanly executes logic
      - name: Run uploader
        if: steps.check_jobs.outputs.has_jobs == 'true'
        working-directory: uploader
        env:
          PW_TOKEN: ${{ secrets.PW_TOKEN }}
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          DOWNLOAD_SOURCE: url
        run: |
          if [ "$DOWNLOAD_SOURCE" = "drive" ]; then
            echo "Using Google Drive source..."
            python upload_from_gdrive.py
          elif [ "$DOWNLOAD_SOURCE" = "url" ]; then
            echo "Using Direct URL source..."
            python upload_from_url.py
          else
            echo "Unknown DOWNLOAD_SOURCE: $DOWNLOAD_SOURCE"
            exit 1
          fi
