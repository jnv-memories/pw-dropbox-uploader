name: Upload Files

on:
  workflow_dispatch:


jobs:

  upload:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r uploader/requirements.txt

      - name: Create Firebase Credentials
        run: |
          cat > uploader/firebase.json << 'EOF'
          ${{ secrets.FIREBASE_JSON }}
          EOF

      ######################################################
      # CHANGE THESE VALUES WHEN NEEDED
      ######################################################

      - name: Run uploader

        env:

          PW_TOKEN: ${{ secrets.PW_TOKEN }}

          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}

          #
          # Choose source
          #
          # drive
          # url
          #

          DOWNLOAD_SOURCE: url

          #
          # Single URL (optional)
          #

          DIRECT_URL: "https://sr.animeheaven.me/video.mp4?32cf66b07cf9089310b2924b66984b1e&fe6656d05616812838cf73d089627df4"

          #
          # Multiple URLs (optional)
          #

          DIRECT_URLS: |
            # https://example.com/file1.mp4
            # https://example.com/file2.mkv

        run: |

          if [ "$DOWNLOAD_SOURCE" = "drive" ]; then

            echo "Using Google Drive source..."

            python uploader/upload_from_gdrive.py

          elif [ "$DOWNLOAD_SOURCE" = "url" ]; then

            echo "Using Direct URL source..."

            python uploader/upload_from_url.py

          else

            echo "Unknown DOWNLOAD_SOURCE: $DOWNLOAD_SOURCE"

            exit 1

          fi
